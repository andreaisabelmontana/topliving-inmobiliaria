name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  packages: write

jobs:
  test:
    name: Lint · Test · Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Lint
        run: ruff check .
      - name: Tests + coverage gate
        run: pytest --cov=app --cov-report=xml --cov-report=term --cov-fail-under=70
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml

  security:
    name: Dependency audit (informational)
    runs-on: ubuntu-latest
    needs: test
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install pip-audit
      - run: pip-audit -r requirements.txt || true

  build:
    name: Build & scan Docker image
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with:
          context: .
          tags: topliving/api:${{ github.sha }}
          load: true
      - name: Trivy scan (informational)
        uses: aquasecurity/trivy-action@master
        continue-on-error: true
        with:
          image-ref: topliving/api:${{ github.sha }}
          severity: HIGH,CRITICAL
          exit-code: '0'

  deploy:
    name: Deploy to Fly.io (main only, requires secret)
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && vars.FLY_DEPLOY_ENABLED == 'true'
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  pages:
    name: Publish GitHub Pages
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./   # entire site/ folder is the Pages root
      - id: deployment
        uses: actions/deploy-pages@v4
